name: Heart Disease Model Training Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'MLProject/**'
  workflow_dispatch:

jobs:
  training-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clone repository
        uses: actions/checkout@v3

      - name: Prepare Python environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install required packages
        run: |
          python -m pip install --upgrade pip
          pip install virtualenv mlflow dagshub pandas scikit-learn matplotlib joblib

      - name: Train model via MLflow Project
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_USER_TOKEN }}
        run: |
          cd MLProject
          virtualenv venv
          source venv/bin/activate
          pip install mlflow==2.13.0 scikit-learn==1.4.2 pandas==2.2.2 joblib==1.4.2 matplotlib==3.8.4 dagshub
          mlflow run . --env-manager=local

      - name: Commit training artifacts to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p MLProject/artifacts/
          git add MLProject/artifacts/
          git diff --staged --quiet || git commit -m "chore: save training artifacts [skip ci]"
          git push

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./MLProject
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/heart-disease-model:latest
